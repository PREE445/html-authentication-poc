<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="d-flex justify-content-center align-items-center center-box">
    <div class="glass-card" style="width: 400px;">

        <h3 class="text-center mb-3">Create Account ✨</h3>

        <form action="login.html">
            <input type="text" class="form-control mb-2" placeholder="Full Name" required>
            <input type="email" class="form-control mb-2" placeholder="Email" required>
            <input type="tel" class="form-control mb-2" placeholder="Phone" required>

            <input type="password" id="regPass" class="form-control mb-2" placeholder="Password" required>
            <input type="password" class="form-control mb-3" placeholder="Confirm Password" required>

            <button class="btn btn-custom w-100">Register</button>
        </form>

        <div class="text-center mt-3">
            <a href="login.html">Already have account?</a>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
