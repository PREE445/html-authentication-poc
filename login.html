<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="d-flex justify-content-center align-items-center center-box">
    
    <div class="glass-card" style="width: 350px;">

        <h3 class="text-center mb-4">Welcome Back 👋</h3>

        <form action="dashboard.html">
            
            <input type="text" class="form-control mb-3" placeholder="Username" required>

            <div class="input-group mb-3">
                <input type="password" id="loginPass" class="form-control" placeholder="Password" required>
                <span class="input-group-text" onclick="togglePass('loginPass')" style="cursor:pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <button class="btn btn-custom w-100">Login</button>

        </form>

        <!-- Stylish Buttons -->
        <div class="text-center mt-4 d-grid gap-2">

            <a href="forgot-password.html" class="btn btn-link-custom">
                <i class="bi bi-key"></i> Forgot Password
            </a>

            <a href="register.html" class="btn btn-outline-custom">
                <i class="bi bi-person-plus"></i> Create Account
            </a>

        </div>

    </div>

</div>

<!-- JS -->
<script>
function togglePass(id){
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
