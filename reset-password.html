<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="d-flex justify-content-center align-items-center center-box">
    <div class="glass-card" style="width: 350px;">

        <h4 class="text-center mb-3">Reset Password</h4>

        <input type="password" id="newPass" class="form-control mb-3" placeholder="New Password">

        <div class="input-group mb-3">
            <input type="password" id="confirmPass" class="form-control" placeholder="Confirm Password">
            <span class="input-group-text" onclick="togglePass('confirmPass')">
                <i class="bi bi-eye"></i>
            </span>
        </div>

        <button class="btn btn-custom w-100">Update Password</button>

        <div class="text-center mt-3">
            <a href="login.html">Back to Login</a>
        </div>

    </div>
</div>

<script>
function togglePass(id){
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
